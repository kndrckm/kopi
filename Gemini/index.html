<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickerify Benchmark | Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom": "https://esm.sh/react-dom@18",
            "lucide-react": "https://esm.sh/lucide-react",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai",
            "@imgly/background-removal": "https://esm.sh/@imgly/background-removal",
            "clsx": "https://esm.sh/clsx",
            "tailwind-merge": "https://esm.sh/tailwind-merge"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sticker-shadow { filter: drop-shadow(0 0 15px rgba(0,0,0,0.1)) drop-shadow(0 0 2px white); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f8f9fa] text-slate-900">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useRef, useEffect } from 'react';
        import ReactDOM from 'react-dom';
        import { 
            Upload, Image as ImageIcon, Clock, CheckCircle2, AlertCircle, 
            Trash2, Download, RefreshCw, Zap, Scissors, Key, Settings 
        } from 'lucide-react';
        import { removeBackground } from '@imgly/background-removal';
        import { GoogleGenAI } from '@google/generative-ai';
        import { clsx } from 'clsx';
        import { twMerge } from 'tailwind-merge';

        function cn(...inputs) {
            return twMerge(clsx(inputs));
        }

        const MODELS = [
            { id: 'rmbg-1.4-local', name: 'RMBG-1.4 (Local)', type: 'local', prompt: '' },
            { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash', type: 'gemini', prompt: 'Extract the main object. Make background transparent. Exclude occluding hands or objects. Output only the clean extracted subject.' },
            { id: 'gemini-2.5-flash-image', name: 'Gemini 2.5 Flash (Preview)', type: 'gemini', prompt: 'Extract the main object. Make background transparent. Exclude occluding hands or objects. Output only the clean extracted subject.' }
        ];

        function App() {
            const [selectedFile, setSelectedFile] = useState(null);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [selectedModel, setSelectedModel] = useState(MODELS[0].id);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progressText, setProgressText] = useState('');
            const [currentResult, setCurrentResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [processingTime, setProcessingTime] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showApiInput, setShowApiInput] = useState(!apiKey);
            
            const fileInputRef = useRef(null);

            const saveApiKey = (key) => {
                setApiKey(key);
                localStorage.setItem('gemini_api_key', key);
                setShowApiInput(false);
            };

            const handleFile = (file) => {
                if (file.type.startsWith('image/')) {
                    setSelectedFile(file);
                    setPreviewUrl(URL.createObjectURL(file));
                    setCurrentResult(null);
                    setProcessingTime(null);
                }
            };

            const processImage = async () => {
                if (!selectedFile) return;
                
                const model = MODELS.find(m => m.id === selectedModel);
                if (model.type === 'gemini' && !apiKey) {
                    setShowApiInput(true);
                    return;
                }

                setIsProcessing(true);
                setProgressText('Initializing...');
                const startTime = performance.now();
                
                let resultUrl = '';
                let status = 'success';
                let errorMessage = '';

                try {
                    if (model.type === 'local') {
                        setProgressText('Processing locally...');
                        const blob = await removeBackground(selectedFile);
                        resultUrl = URL.createObjectURL(blob);
                    } else if (model.type === 'gemini') {
                        setProgressText('Sending to Gemini...');
                        const base64Data = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.readAsDataURL(selectedFile);
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                        });

                        const genAI = new GoogleGenAI(apiKey);
                        const aiModel = genAI.getGenerativeModel({ model: model.id });
                        
                        const result = await aiModel.generateContent({
                            contents: [{
                                parts: [
                                    { inlineData: { data: base64Data, mimeType: selectedFile.type } },
                                    { text: model.prompt }
                                ]
                            }]
                        });

                        const response = await result.response;
                        let foundImage = false;
                        for (const part of response.candidates?.[0]?.content?.parts || []) {
                            if (part.inlineData) {
                                resultUrl = `data:${part.inlineData.mimeType};base64,${part.inlineData.data}`;
                                foundImage = true;
                                break;
                            }
                        }
                        
                        if (!foundImage) throw new Error('Gemini didn\'t return an image. It might have blocked the content.');
                    }
                } catch (error) {
                    status = 'error';
                    errorMessage = error.message;
                } finally {
                    const timeMs = performance.now() - startTime;
                    setIsProcessing(false);
                    if (status === 'success') {
                        setCurrentResult(resultUrl);
                        setProcessingTime(timeMs);
                    }
                    setHistory(prev => [{
                        id: Date.now(),
                        modelName: model.name,
                        timeMs,
                        originalImage: previewUrl,
                        resultImage: resultUrl,
                        status,
                        errorMessage,
                        timestamp: new Date()
                    }, ...prev]);
                }
            };

            return React.createElement('div', { className: 'min-h-screen pb-12' }, [
                // Header
                React.createElement('header', { className: 'bg-white/80 border-b sticky top-0 z-50 glass px-6 h-16 flex items-center justify-between' }, [
                    React.createElement('div', { className: 'flex items-center gap-3' }, [
                        React.createElement('div', { className: 'bg-indigo-600 p-1.5 rounded-lg text-white' }, React.createElement(Scissors, { size: 18 })),
                        React.createElement('h1', { className: 'font-bold text-lg tracking-tight' }, 'Stickerify Benchmark')
                    ]),
                    React.createElement('button', { 
                        onClick: () => setShowApiInput(true),
                        className: 'flex items-center gap-2 text-sm font-medium text-slate-600 hover:text-indigo-600 transition-colors'
                    }, [
                        React.createElement(Key, { size: 16 }),
                        apiKey ? 'Update Key' : 'Enter API Key'
                    ])
                ]),

                // Main Content
                React.createElement('main', { className: 'max-w-6xl mx-auto p-6 gap-8 grid grid-cols-1 lg:grid-cols-2 mt-4' }, [
                    // Controls
                    React.createElement('div', { className: 'space-y-6' }, [
                        // API Key Modal/Inline
                        showApiInput && React.createElement('div', { className: 'p-6 bg-amber-50 rounded-2xl border border-amber-200 shadow-sm animate-in fade-in slide-in-from-top-4' }, [
                            React.createElement('h2', { className: 'font-semibold text-amber-900 flex items-center gap-2 mb-2' }, [
                                React.createElement(Key, { size: 18 }),
                                'Gemini API Key Required'
                            ]),
                            React.createElement('p', { className: 'text-sm text-amber-800 mb-4' }, 'Get your free key at ai.google.dev. It is stored ONLY on this device.'),
                            React.createElement('div', { className: 'flex gap-2' }, [
                                React.createElement('input', { 
                                    type: 'password',
                                    placeholder: 'Paste your API key here...',
                                    className: 'flex-1 px-4 py-2 rounded-xl border-amber-200 border bg-white focus:outline-none focus:ring-2 focus:ring-amber-400',
                                    onChange: (e) => setApiKey(e.target.value),
                                    onKeyPress: (e) => e.key === 'Enter' && saveApiKey(e.target.value)
                                }),
                                React.createElement('button', {
                                    onClick: () => saveApiKey(apiKey),
                                    className: 'bg-amber-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-amber-700 transition-colors'
                                }, 'Save')
                            ])
                        ]),

                        // Upload
                        React.createElement('div', { className: 'bg-white p-6 rounded-[2rem] border shadow-sm' }, [
                            React.createElement('h3', { className: 'font-bold mb-4 flex items-center gap-2' }, [
                                React.createElement('span', { className: 'w-6 h-6 rounded-full bg-slate-100 text-xs flex items-center justify-center' }, '1'),
                                'Upload Photo'
                            ]),
                            React.createElement('div', {
                                onClick: () => fileInputRef.current.click(),
                                className: cn(
                                    "border-2 border-dashed rounded-3xl p-8 text-center cursor-pointer transition-all",
                                    previewUrl ? "border-slate-200 bg-slate-50" : "border-slate-300 hover:border-indigo-400 hover:bg-indigo-50/30"
                                )
                            }, [
                                React.createElement('input', { ref: fileInputRef, type: 'file', className: 'hidden', onChange: (e) => handleFile(e.target.files[0]) }),
                                previewUrl ? React.createElement('img', { src: previewUrl, className: 'max-h-64 mx-auto rounded-xl shadow-sm' })
                                : React.createElement('div', { className: 'space-y-2' }, [
                                    React.createElement(Upload, { className: 'mx-auto text-slate-400', size: 32 }),
                                    React.createElement('p', { className: 'font-medium text-slate-600' }, 'Click or drag photo')
                                ])
                            ])
                        ]),

                        // Model Select
                        React.createElement('div', { className: 'bg-white p-6 rounded-[2rem] border shadow-sm' }, [
                            React.createElement('h3', { className: 'font-bold mb-4 flex items-center gap-2' }, [
                                React.createElement('span', { className: 'w-6 h-6 rounded-full bg-slate-100 text-xs flex items-center justify-center' }, '2'),
                                'Choose Engine'
                            ]),
                            React.createElement('div', { className: 'space-y-3' }, MODELS.map(m => 
                                React.createElement('label', { 
                                    key: m.id,
                                    className: cn(
                                        "flex items-center justify-between p-4 rounded-[1.25rem] border cursor-pointer transition-all",
                                        selectedModel === m.id ? "border-indigo-600 bg-indigo-50 ring-1 ring-indigo-600" : "hover:bg-slate-50"
                                    )
                                }, [
                                    React.createElement('div', { className: 'flex items-center gap-3' }, [
                                        React.createElement('input', { type: 'radio', checked: selectedModel === m.id, onChange: () => setSelectedModel(m.id) }),
                                        React.createElement('div', {}, [
                                            React.createElement('p', { className: 'font-bold text-sm' }, m.name),
                                            React.createElement('p', { className: 'text-[10px] uppercase font-bold text-slate-400' }, m.type)
                                        ])
                                    ]),
                                    m.type === 'local' && React.createElement('span', { className: 'text-[10px] font-bold bg-green-100 text-green-700 px-2 py-0.5 rounded-full' }, 'NO KEY NEEDED')
                                ])
                            )),
                            React.createElement('button', {
                                disabled: !selectedFile || isProcessing,
                                onClick: processImage,
                                className: cn(
                                    "w-full mt-6 py-4 rounded-[1.25rem] font-bold text-white transition-all shadow-lg",
                                    !selectedFile || isProcessing ? "bg-slate-200 cursor-not-allowed" : "bg-indigo-600 hover:shadow-indigo-200 hover:scale-[1.02]"
                                )
                            }, isProcessing ? progressText : 'GENERATE STICKER')
                        ])
                    ]),

                    // Result
                    React.createElement('div', { className: 'bg-white p-8 rounded-[2.5rem] border shadow-sm min-h-[500px] flex flex-col' }, [
                        React.createElement('div', { className: 'flex justify-between items-center mb-6' }, [
                            React.createElement('h3', { className: 'text-xl font-bold font-serif' }, 'Result'),
                            processingTime && React.createElement('div', { className: 'text-xs font-bold px-3 py-1 bg-slate-100 rounded-full flex items-center gap-1.5' }, [
                                React.createElement(Clock, { size: 12 }),
                                (processingTime / 1000).toFixed(2) + 's'
                            ])
                        ]),
                        React.createElement('div', { 
                            className: 'flex-1 rounded-[2rem] border-2 border-dashed border-slate-100 bg-[#fafafa] relative overflow-hidden flex items-center justify-center p-8'
                        }, [
                            isProcessing ? React.createElement(RefreshCw, { size: 32, className: 'animate-spin text-indigo-200' })
                            : currentResult ? React.createElement('div', { className: 'relative group' }, [
                                React.createElement('img', { src: currentResult, className: 'max-h-80 sticker-shadow transition-transform group-hover:scale-105' }),
                                React.createElement('a', { 
                                    href: currentResult, 
                                    download: 'sticker.png',
                                    className: 'absolute bottom-0 right-0 p-3 bg-white shadow-xl rounded-full translate-y-4 opacity-0 group-hover:opacity-100 group-hover:translate-y-0 transition-all'
                                }, React.createElement(Download, { size: 20 }))
                            ])
                            : React.createElement('div', { className: 'text-slate-300 flex flex-col items-center gap-3' }, [
                                React.createElement(ImageIcon, { size: 48, strokeWidth: 1 }),
                                React.createElement('p', { className: 'font-medium text-sm' }, 'Your sticker will appear here')
                            ])
                        ])
                    ])
                ]),

                // History (Optional - keeping it light)
                history.length > 0 && React.createElement('div', { className: 'max-w-6xl mx-auto px-6 mt-8' }, [
                    React.createElement('h3', { className: 'font-bold text-slate-400 uppercase text-xs tracking-widest mb-4' }, 'Session History'),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4' }, history.map(h => 
                        React.createElement('div', { key: h.id, className: 'bg-white p-3 rounded-2xl border shadow-sm space-y-2 group relative overflow-hidden' }, [
                            React.createElement('img', { src: h.resultImage || h.originalImage, className: 'w-full h-24 object-contain mx-auto' }),
                            React.createElement('div', { className: 'flex justify-between items-center' }, [
                                React.createElement('p', { className: 'text-[9px] font-bold text-slate-400' }, h.modelName.split(' ')[0]),
                                React.createElement('p', { className: 'text-[9px] font-bold ' + (h.status === 'success' ? 'text-green-500' : 'text-red-500') }, h.status === 'success' ? (h.timeMs/1000).toFixed(1)+'s' : 'ERROR')
                            ])
                        ])
                    ))
                ])
            ]);
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
